<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name = "author" content = "Ferrari William Njoki">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuovo Artista</title>
</head>

<body>
  <h1>Aggiungi Artista</h1>

  <a href = "index.html">Torna alla Lista</a>

  <br><br>

  <label for = "codice">Codice: </label> <input type="text" id="codice" placeholder="Codice (es. A350)"><br>
  <label for = "nome">Nome: </label><input type="text" id="nome" placeholder="Nome"><br>
  <label for = "alias">Alias: </label> <input type="text" id="alias" placeholder="Alias"><br>
  <label for = "nascita">Nascita: </label> <input type="number" id="nascita" placeholder="Anno Nascita"><br>
  <label for = "morte">Morte: </label> <input type="number" id="morte" placeholder="Anno Morte"><br>

  <br>

  <button onclick="crea_artista()">Salva</button>

  <p id = "messaggio"></p>

  <script>
    const SERVER = "http://localhost/php/arte_api/server/";

    async function crea_artista() {
      const data = {
          AR_CodiceArtista: document.getElementById("codice").value,
          AR_Nome: document.getElementById("nome").value,
          AR_Alias: document.getElementById("alias").value,
          AR_DataNascita: document.getElementById("nascita").value,
          AR_DataMorte: document.getElementById("morte").value
        };
      
        const risposta = await fetch(`${SERVER}/artisti`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const risultato = await risposta.json();
        document.getElementById("messaggio").textContent = risultato.messaggio || risultato.errore;
    }
  </script>
</body>
</html>
